version: 2

models:
  - name: slv_health_events
    description: Standardized event table for downstream marts.
    columns:
      - name: event_sk
        tests:
          - not_null
          - unique
      - name: event_id
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['success', 'failed', 'running']
              quote: true
      - name: run_duration_seconds
        tests:
          - not_null
