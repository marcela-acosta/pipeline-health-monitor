      - name: stage
        description: Normalized sales stage in lowercase.
        tests:
          - not_null
      - name: agent_id
        description: Responsible sales agent identifier.
      - name: product
        description: Product associated with the opportunity.
      - name: value
        description: Opportunity value amount.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: region
        description: Uppercase region value.
      - name: expected_close_date
        description: Expected close date parsed to DATE.
      - name: updated_at
        description: Source-updated timestamp parsed to TIMESTAMP.
      - name: ingested_at
        description: Ingestion timestamp from bronze.
        tests:
          - not_null
      - name: staged_at
        description: Timestamp when the row was transformed in the staging layer.
        tests:
          - not_null

