version: 2

models:
  - name: brz_health_events
    description: Bronze event table with raw-compatible columns.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: pipeline_name
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['success', 'failed', 'running']
              quote: true
      - name: event_ts
        tests:
          - not_null
