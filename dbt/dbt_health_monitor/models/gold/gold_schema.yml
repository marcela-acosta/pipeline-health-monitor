version: 2

models:
  - name: gld_dashboard_opportunities
    description: Dashboard-ready opportunity-level CRM table from Silver.
    columns:
      - name: opportunity_id
        tests:
          - not_null
          - unique
      - name: stage
        tests:
          - not_null
          - accepted_values:
              values: ['Prospecting', 'Qualified', 'Proposal', 'Negotiation', 'Won', 'Lost']
      - name: value
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: gld_pipeline_by_stage
    description: Aggregated pipeline metrics by sales stage.

  - name: gld_conversion_by_agent
    description: Conversion and value metrics by sales agent.

  - name: gld_conversion_by_product
    description: Conversion and value metrics by product.

  - name: gld_stale_opportunities
    description: Opportunities not updated in more than 14 days.